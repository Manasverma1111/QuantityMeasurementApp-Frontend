<div class="dashboard-shell">
  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">QuantaConvert</span>
    </div>
    <button class="logout-btn" (click)="logout()">
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
      Logout
    </button>
  </header>

  <main class="dashboard-main">
    <!-- Title -->
    <div class="page-header">
      <h1 class="page-title"><em>Quantity Measurement</em></h1>
      <p class="page-subtitle">Convert, compare & compute across units</p>
    </div>

    <!-- Category Selector -->
    <div class="card category-card">
      <label class="field-label">Category</label>
      <div class="category-tabs">
        <button
          *ngFor="let c of ['LENGTH', 'WEIGHT', 'TEMPERATURE', 'VOLUME']"
          class="cat-tab"
          [class.active]="selectedCategory === c"
          (click)="onCategoryChange(c)"
        >
          <span class="cat-icon">{{ categoryIcons[c] }}</span>
          {{ c }}
        </button>
      </div>
    </div>

    <!-- Inputs -->
    <div class="card inputs-card">
      <div class="inputs-row">
        <!-- Input 1 -->
        <div class="input-block">
          <label class="field-label">Value A</label>
          <div class="input-combo">
            <input type="number" class="value-input" [(ngModel)]="q1.value" placeholder="0.00" />
            <select class="unit-select" [(ngModel)]="q1.unit">
              <option *ngFor="let u of units" [value]="u.value">{{ u.label }}</option>
            </select>
          </div>
        </div>

        <!-- Inline Convert Button -->
        <div class="swap-divider">
          <button class="convert-inline-btn" (click)="convert()" title="Convert A → B">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M5 12h14" />
              <path d="M13 6l6 6-6 6" />
            </svg>
          </button>
        </div>

        <!-- Input 2 -->
        <div class="input-block">
          <label class="field-label">Value B</label>
          <div class="input-combo">
            <input type="number" class="value-input" [(ngModel)]="q2.value" placeholder="0.00" />
            <select class="unit-select" [(ngModel)]="q2.unit">
              <option *ngFor="let u of units" [value]="u.value">{{ u.label }}</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Preview -->
      <!-- <div class="preview-pill" *ngIf="preview">
        <span class="pill-dot"></span>
        <span>{{ preview.value }} {{ preview.unit }}</span>
      </div> -->
    </div>

    <!-- Actions -->
    <div class="card actions-card">
      <label class="field-label">Operations</label>
      <div class="action-grid">
        <button class="action-btn primary" (click)="convert()">
          <span class="btn-icon">⇌</span> Convert
        </button>
        <button class="action-btn" (click)="add()"><span class="btn-icon">+</span> Add</button>
        <button class="action-btn" (click)="subtract()">
          <span class="btn-icon">−</span> Subtract
        </button>
        <button class="action-btn" (click)="compare()">
          <span class="btn-icon">≈</span> Compare
        </button>
        <button class="action-btn" (click)="divide()">
          <span class="btn-icon">÷</span> Divide
        </button>
      </div>
    </div>

    <!-- Result -->
    <div class="card result-card" *ngIf="result !== null && result !== undefined">
      <span class="result-label">Result</span>
      <div class="result-value">
        <ng-container *ngIf="result?.value !== undefined; else textResult">
          {{ result.value }} {{ result.unit }}
        </ng-container>
        <ng-template #textResult>
          {{ result }}
        </ng-template>
      </div>
    </div>

    <!-- History -->
    <div class="card history-card">
      <div class="history-header">
        <h3 class="history-title">Recent Activity</h3>
        <span class="history-count">{{ history.length }} entries</span>
      </div>
      <div class="history-list">
        <div
          *ngFor="let h of history; let i = index"
          class="history-item"
          [style.animation-delay]="i * 40 + 'ms'"
        >
          <span class="h-op">{{ h.operation }}</span>
          <span class="h-detail">
            {{ h.operand1 }}<span *ngIf="h.operand2">, {{ h.operand2 }}</span>
          </span>
          <span class="h-arrow">→</span>
          <span class="h-result">{{ h.result }}</span>
        </div>
        <div class="history-empty" *ngIf="history.length === 0">
          No operations yet. Start converting!
        </div>
      </div>
    </div>
  </main>
</div>
